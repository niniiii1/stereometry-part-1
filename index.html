<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>სტერეომეტრიის კომპლექსური ქვიზი</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            margin: 0;
        }
        .quiz-container {
            max-width: 800px;
            margin: auto;
            background: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        .question-card {
            margin-bottom: 25px;
            padding: 20px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            background-color: #fafafa;
        }
        .question-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .options-list {
            list-style-type: none;
            padding: 0;
        }
        .option-item {
            margin-bottom: 10px;
        }
        .option-btn {
            width: 100%;
            text-align: left;
            padding: 12px 15px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            background-color: white;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.2s ease;
        }
        .option-btn:hover:not([disabled]) {
            background-color: #e8f4fd;
            border-color: #3498db;
        }
        .correct {
            background-color: #2ecc71 !important;
            border-color: #27ae60 !important;
            color: white !important;
        }
        .incorrect {
            background-color: #e74c3c !important;
            border-color: #c0392b !important;
            color: white !important;
        }
        .explanation {
            margin-top: 15px;
            padding: 12px;
            border-left: 4px solid #3498db;
            background-color: #e8f4fd;
            border-radius: 0 6px 6px 0;
            display: none;
            font-size: 0.95em;
        }
        #result-panel {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: #2c3e50;
            color: white;
            border-radius: 8px;
            display: none;
        }
        .submit-btn {
            display: block;
            width: 200px;
            margin: 20px auto;
            padding: 12px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.1em;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>სტერეომეტრიის კომპლექსური ქვიზი (30 კითხვა)</h1>
    <div id="quiz-questions"></div>
    <button class="submit-btn" id="finish-btn" onclick="calculateResult()">ტესტის დასრულება</button>
    
    <div id="result-panel">
        <h2>თქვენი შედეგი</h2>
        <p id="score-text"></p>
    </div>
</div>

function renderQuiz() {
    const container = document.getElementById('quiz-questions');
    quizData.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.id = `q-card-${index}`;

        const title = document.createElement('div');
        title.className = 'question-title';
        title.innerText = `${index + 1}. ${item.q}`;
        card.appendChild(title);

        const optionsList = document.createElement('ul');
        optionsList.className = 'options-list';

        item.a.forEach((opt, optIndex) => {
            const li = document.createElement('li');
            li.className = 'option-item';

            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.id = `btn-${index}-${optIndex}`;
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, optIndex);

            li.appendChild(btn);
            optionsList.appendChild(li);
        });

        card.appendChild(optionsList);

        const exp = document.createElement('div');
        exp.className = 'explanation';
        exp.id = `exp-${index}`;
        exp.innerText = item.exp;
        card.appendChild(exp);

        container.appendChild(card);
    });
}

let score = 0;
let answeredCount = 0;

function checkAnswer(qIndex, selectedOpt) {
    const item = quizData[qIndex];
    const correctOpt = item.correct;
    
    // Disable all buttons for this question
    item.a.forEach((_, optIndex) => {
        document.getElementById(`btn-${qIndex}-${optIndex}`).disabled = true;
    });

    const selectedBtn = document.getElementById(`btn-${qIndex}-${selectedOpt}`);
    const correctBtn = document.getElementById(`btn-${qIndex}-${correctOpt}`);
    const expDiv = document.getElementById(`exp-${qIndex}`);

    if (selectedOpt === correctOpt) {
        selectedBtn.classList.add('correct');
        score++;
    } else {
        selectedBtn.classList.add('incorrect');
        correctBtn.classList.add('correct'); // Show correct answer too
    }

    // Show explanation
    expDiv.style.display = 'block';
    answeredCount++;
}

function calculateResult() {
    const resultPanel = document.getElementById('result-panel');
    const scoreText = document.getElementById('score-text');
    
    resultPanel.style.display = 'block';
    scoreText.innerText = `თქვენ უპასუხეთ ${quizData.length}-დან ${score} კითხვას სწორად.`;
    
    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
    });
}

// Initialize quiz
renderQuiz();
